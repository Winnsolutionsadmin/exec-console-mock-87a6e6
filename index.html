<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Console — mockup v7</title>
<style>
  :root{
    --bg:#f7f6f3; --panel:#ffffff; --ink:#1c1c1e; --ink-2:#6e6e73; --ink-3:#a1a1a6;
    --line:#e8e6e1; --accent:#2f6fed; --accent-soft:#eaf1fe;
    --human:#a07440; --human-soft:#f5ede2;
    --good:#2e9e6b; --good-soft:#e7f5ee;
    --warn:#b0730f; --warn-soft:#fdf3e2;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;
    display:flex; height:100vh; overflow:hidden;
  }
  /* ---------- 1. Sidebar ---------- */
  aside{width:236px;flex-shrink:0;border-right:1px solid var(--line);padding:20px 12px;overflow-y:auto}
  aside h1{font-size:15px;font-weight:700;padding:0 10px 12px;letter-spacing:-.01em}
  .ny{background:var(--human-soft);border:1px solid #e5d5bd;border-radius:12px;padding:10px 11px;margin:0 2px 14px}
  .ny .ny-h{font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--human);margin-bottom:7px}
  .ny .ny-item{font-size:12px;font-weight:600;line-height:1.4;padding:6px 8px;border-radius:8px;cursor:pointer;background:rgba(255,255,255,.65)}
  .ny .ny-item+.ny-item{margin-top:5px}
  .ny .ny-item:hover{background:#fff}
  .ny .ny-item .ny-a{display:block;font-size:10.5px;color:var(--ink-2);font-weight:500;margin-top:1px}
  .ny .ny-none{font-size:11.5px;color:var(--good);font-weight:600}
  .org{font-size:10.5px;font-weight:700;letter-spacing:.09em;color:var(--ink-3);padding:14px 10px 6px;text-transform:uppercase}
  .proj{display:flex;flex-direction:column;gap:1px;padding:8px 10px;border-radius:10px;cursor:pointer;user-select:none}
  .proj:hover{background:#efede9}
  .proj.active{background:var(--accent-soft)}
  .proj .p-name{font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:6px}
  .proj.active .p-name{color:var(--accent)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--human);flex-shrink:0}
  .dot.ok{background:#d3d0c9}
  .agent-h{display:flex;align-items:center;gap:7px;padding:7px 10px 4px;cursor:pointer;user-select:none}
  .agent-h .a-name{font-size:12px;font-weight:750}
  .agent-h.unsorted .a-name{color:var(--warn)}
  .agent-h .a-count{font-size:10px;font-weight:700;color:var(--ink-3);background:#efede9;border-radius:99px;padding:1px 7px}
  .agent-h .tw{font-size:9px;color:var(--ink-3);transition:transform .15s}
  .agent-h.open .tw{transform:rotate(90deg)}
  .agent-kids{display:none}
  .agent-h.open+.agent-kids{display:block}
  .unsort-hint{font-size:10.5px;color:var(--warn);padding:2px 10px 4px 26px;line-height:1.4}
  .repo-row{display:flex;justify-content:space-between;align-items:center;padding:5px 10px 5px 26px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--ink-2)}
  .repo-row:hover{background:#efede9;color:var(--ink)}
  .repo-row.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
  .repo-row .r-d{font-size:10px;color:var(--ink-3)}
  .repo-row[draggable]{cursor:grab}
  .agent-h.dragover,.org.dragover{outline:2px dashed var(--accent);outline-offset:1px;border-radius:8px}
  .showmore{font-size:11px;color:var(--accent);font-weight:700;padding:4px 10px 6px 26px;cursor:pointer}
  /* ---------- 2. Chat ---------- */
  .chat{width:378px;flex-shrink:0;border-right:1px solid var(--line);display:flex;flex-direction:column;background:var(--panel);min-width:0}
  .chat-head{padding:15px 18px 0;display:flex;justify-content:space-between;align-items:flex-start}
  .chat-head .agent{font-size:15px;font-weight:800}
  .chat-head .role{font-size:11.5px;color:var(--ink-2);margin-bottom:11px}
  .chat-toggle{display:none;font-size:11px;font-weight:700;color:var(--accent);cursor:pointer;padding:2px 8px}
  .needs{padding:11px 18px;font-size:12.5px;font-weight:700;border-top:1px solid var(--line);border-bottom:1px solid var(--line);
    background:var(--human-soft);color:var(--human);display:flex;gap:8px;align-items:center;transition:all .5s ease}
  .needs.clear{background:var(--good-soft);color:var(--good)}
  .msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
  .m{max-width:94%}
  .m .who{font-size:11px;color:var(--ink-3);margin-bottom:3px;font-weight:600}
  .m .bubble{background:#f4f2ee;border-radius:14px;padding:10px 13px;font-size:13px;line-height:1.5}
  .m.you{align-self:flex-end}
  .m.you .bubble{background:var(--accent);color:#fff}
  .m.you .who{text-align:right}
  .pairwrap{border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .pairwrap .pw-h{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);padding:8px 13px 0}
  .pair{padding:9px 13px;border-bottom:1px solid var(--line)}
  .pair:last-child{border-bottom:0}
  .pair .p-q{font-size:12.5px;font-weight:700;color:var(--accent);line-height:1.45}
  .pair .p-q .p-lab,.pair .p-a .p-lab{display:block;font-size:9.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);margin-bottom:2px}
  .pair .p-a{font-size:12.5px;line-height:1.5;margin-top:7px}
  .decision{border:1.5px solid #e5d5bd;background:var(--human-soft);border-radius:16px;padding:13px 15px}
  .decision .d-tag{font-size:10.5px;font-weight:800;letter-spacing:.07em;color:var(--human);text-transform:uppercase;margin-bottom:6px}
  .decision .d-q{font-size:13px;font-weight:700;margin-bottom:4px;line-height:1.4}
  .decision .d-ctx{font-size:12px;color:var(--ink-2);line-height:1.5;margin-bottom:10px}
  .opt{display:block;width:100%;text-align:left;font:inherit;font-size:12.5px;font-weight:600;
    background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:9px 12px;margin-bottom:7px;cursor:pointer;transition:all .15s ease}
  .opt:hover{border-color:var(--human)}
  .opt .rec{font-size:9.5px;font-weight:800;color:var(--human);letter-spacing:.05em;margin-left:6px}
  .opt .sub{display:block;font-size:11px;color:var(--ink-2);font-weight:500;margin-top:2px}
  .decision.answered .opt{opacity:.45;pointer-events:none}
  .decision.answered .opt.chosen{opacity:1;border-color:var(--good);background:var(--good-soft)}
  .d-state{font-size:11.5px;color:var(--good);font-weight:700;margin-top:4px;display:none}
  .decision.answered .d-state{display:block}
  .d-foot{font-size:10.5px;color:var(--ink-3);margin-top:8px;border-top:1px dashed #e5d5bd;padding-top:7px;line-height:1.45}
  .auto-line{font-size:10.5px;color:var(--ink-3);text-align:center;padding:6px 14px 0;line-height:1.4}
  .peek{font-size:11px;color:var(--ink-3);text-align:center;padding:7px;cursor:pointer;user-select:none;border-top:1px solid var(--line)}
  .peek:hover{color:var(--ink-2)}
  .engine{display:none;max-height:190px;overflow-y:auto;border-top:1px solid var(--line);background:#faf9f7;padding:10px 16px}
  .engine.open{display:block}
  .engine .e-cap{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);padding-bottom:6px}
  .engine .e-row{font-size:11px;color:var(--ink-2);padding:4px 0;border-bottom:1px dashed var(--line);font-family:ui-monospace,Menlo,monospace}
  .engine .e-rule{color:var(--human);font-weight:700}
  .engine .e-id{color:var(--ink-3)}
  .composer{border-top:1px solid var(--line);padding:11px 14px;display:flex;gap:8px}
  .composer input{flex:1;font:inherit;font-size:13px;border:1px solid var(--line);border-radius:99px;padding:9px 15px;outline:none;background:var(--bg)}
  .composer input:focus{border-color:var(--accent)}
  /* ---------- 3. Main ---------- */
  main{flex:1;min-width:0;padding:24px 28px;overflow-y:auto}
  .crumb{font-size:12px;color:var(--ink-3);margin-bottom:4px}
  .title-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .title-row h2{font-size:24px;font-weight:800;letter-spacing:-.02em}
  .title-row .runby{font-size:13px;color:var(--ink-2)}
  .ctx-chips{display:flex;gap:6px;flex-wrap:wrap;margin:7px 0 16px}
  .ctx-chips .cx{font-size:10px;font-weight:700;color:var(--ink-2);background:#efede9;border-radius:99px;padding:3px 9px}
  .ctx-chips .cx.macro{color:var(--human);background:var(--human-soft)}
  .pipeline{display:flex;align-items:stretch;margin-bottom:8px;overflow-x:auto;padding-bottom:6px}
  .phase{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;min-width:148px;flex-shrink:0;transition:all .5s ease;cursor:pointer}
  .phase:hover{box-shadow:0 3px 12px rgba(0,0,0,.05)}
  .phase .ph-name{font-size:12.5px;font-weight:700;margin-bottom:2px}
  .phase .ph-meta{font-size:10.5px;color:var(--ink-2);margin-bottom:8px;line-height:1.35}
  .bar{height:5px;border-radius:3px;background:#eeece7;overflow:hidden}
  .bar i{display:block;height:100%;border-radius:3px;background:var(--accent);transition:width .8s ease}
  .phase.done-p .bar i{background:var(--good)}
  .phase.active{border-color:var(--accent);box-shadow:0 1px 10px rgba(47,111,237,.10)}
  .phase.waiting{opacity:.62}
  .phase.human{background:var(--human-soft);border-color:#e5d5bd}
  .phase.human .ph-name{color:var(--human)}
  .gate{align-self:center;width:34px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--ink-3);font-size:15px;transition:color .6s ease}
  .gate.fired{color:var(--good)}
  .gate.firing{animation:gpulse 1.2s ease 2}
  @keyframes gpulse{0%{transform:scale(1)}50%{transform:scale(1.5);color:var(--good)}100%{transform:scale(1)}}
  .rollup{display:flex;gap:20px;align-items:center;border-top:1px solid var(--line);margin:13px 0 20px;padding-top:11px;font-size:12.5px;color:var(--ink-2);flex-wrap:wrap}
  .rollup b{color:var(--ink);font-weight:700}
  .tabs{display:flex;gap:4px;margin-bottom:13px;flex-wrap:wrap}
  .tab{font-size:12px;font-weight:700;padding:6px 14px;border-radius:99px;cursor:pointer;color:var(--ink-2);user-select:none}
  .tab.on{background:var(--ink);color:#fff}
  .kanban{display:flex;gap:12px;align-items:flex-start;overflow-x:auto;padding-bottom:8px}
  .kcol{background:#f1efe9;border-radius:14px;padding:10px;min-width:242px;flex:1}
  .kcol.dragover{outline:2px dashed var(--accent);outline-offset:2px}
  .kcol .k-h{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);padding:2px 6px 9px;display:flex;justify-content:space-between}
  .kcol .card{margin-bottom:9px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:13px 15px;cursor:pointer;transition:transform .12s ease,box-shadow .12s ease}
  .card:hover{transform:translateY(-1px);box-shadow:0 3px 14px rgba(0,0,0,.06)}
  .card.dragging{opacity:.45}
  .c-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;margin-bottom:7px}
  .c-name{font-size:12.5px;font-weight:650;line-height:1.35}
  .pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;white-space:nowrap}
  .pill.prog{background:var(--accent-soft);color:var(--accent)}
  .pill.done{background:var(--good-soft);color:var(--good)}
  .pill.q{background:#f1efe9;color:var(--ink-2)}
  .pill.warn{background:var(--warn-soft);color:var(--warn)}
  .c-check{font-size:11px;color:var(--ink-2);margin-top:6px;line-height:1.4}
  .c-check .next{color:var(--ink);font-weight:600}
  .c-fields{font-size:10.5px;color:var(--ink-3);margin-top:6px}
  .ticks{letter-spacing:2px;font-size:10.5px;margin-top:5px}
  .ticks .on{color:var(--good)} .ticks .off{color:#d5d2ca}
  .empty{font-size:13px;color:var(--ink-2);padding:20px;border:1px dashed var(--line);border-radius:var(--radius);background:var(--panel)}
  .section-note{font-size:11.5px;color:var(--ink-3);margin:-6px 0 12px}
  /* quotes tab */
  .q-base{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 17px;margin-bottom:14px}
  .q-base .qb-h{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);margin-bottom:7px}
  .q-base .qb-big{font-size:17px;font-weight:800}
  .q-base .qb-sub{font-size:12px;color:var(--ink-2);line-height:1.55;margin-top:4px}
  .qtable{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:14px}
  .qtable th{font-size:10.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);text-align:left;padding:10px 13px;border-bottom:1px solid var(--line);background:#fbfaf8}
  .qtable td{font-size:12.5px;padding:11px 13px;border-bottom:1px solid var(--line);vertical-align:top}
  .qtable tr:last-child td{border-bottom:0}
  .qtable tr.clickable{cursor:pointer}
  .qtable tr.clickable:hover td{background:#fbfaf8}
  .qtable .q-amt{font-weight:800;white-space:nowrap}
  .qtable .q-carrier{font-weight:650}
  .qtable .q-note{font-size:11px;color:var(--ink-2);margin-top:2px;line-height:1.4}
  .src-chip{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-soft);border-radius:99px;padding:2px 8px;cursor:pointer;white-space:nowrap}
  .src-chip:hover{filter:brightness(.95)}
  .dp-card{border:1.5px solid #e5d5bd;background:var(--human-soft);border-radius:16px;padding:15px 18px;margin-bottom:14px}
  .dp-card .dp-tag{font-size:10.5px;font-weight:800;letter-spacing:.07em;color:var(--human);text-transform:uppercase;margin-bottom:6px}
  .dp-card .dp-pt{font-size:12.5px;line-height:1.55;padding:6px 0;border-bottom:1px dashed #e5d5bd}
  .dp-card .dp-pt:last-of-type{border-bottom:0}
  .dp-card .dp-pt b{font-weight:750}
  .dp-card .dp-n{display:inline-block;width:17px;height:17px;border-radius:50%;background:var(--human);color:#fff;font-size:10px;font-weight:800;text-align:center;line-height:17px;margin-right:7px}
  .ill{font-size:9.5px;font-weight:800;letter-spacing:.05em;color:var(--warn);background:var(--warn-soft);border-radius:99px;padding:2px 7px;text-transform:uppercase;white-space:nowrap}
  .wc-done{background:var(--good-soft);border:1px solid #cfe8db;border-radius:var(--radius);padding:14px 17px;margin-bottom:14px}
  .wc-done .wc-h{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--good);margin-bottom:8px}
  .minipipe{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:11.5px;font-weight:600;color:var(--good);margin-bottom:8px}
  .minipipe .mp{background:#fff;border:1px solid #cfe8db;border-radius:99px;padding:3px 10px}
  .minipipe .mp.h{background:var(--human-soft);border-color:#e5d5bd;color:var(--human)}
  /* log + timeline */
  .chips{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
  .chip{font-size:11px;font-weight:700;padding:5px 12px;border-radius:99px;cursor:pointer;background:#f1efe9;color:var(--ink-2);user-select:none}
  .chip.on{background:var(--ink);color:#fff}
  .tl{position:relative;padding-left:26px}
  .tl::before{content:'';position:absolute;left:9px;top:8px;bottom:8px;width:2px;background:var(--line)}
  .tl-item{position:relative;margin-bottom:14px}
  .tl-item .tl-dot{position:absolute;left:-22px;top:5px;width:10px;height:10px;border-radius:50%;background:#d5d2ca;border:2px solid var(--panel)}
  .tl-item.sent .tl-dot{background:var(--accent)} .tl-item.recv .tl-dot{background:var(--good)}
  .tl-item.human .tl-dot{background:var(--human)} .tl-item.gatef .tl-dot{background:var(--good)}
  .tl-item .tl-meta{font-size:11px;color:var(--ink-3);margin-bottom:4px;line-height:1.5}
  .tl-item .tl-meta b{color:var(--ink);font-size:12px}
  .tl-item .tl-what{font-size:12.5px;color:var(--ink-2);line-height:1.5}
  .tl-item .tl-what b{color:var(--ink)}
  .mail{border:1px solid var(--line);border-radius:12px;background:var(--panel);overflow:hidden;margin-top:4px}
  .mail .mail-h{padding:9px 13px;cursor:pointer;display:flex;justify-content:space-between;gap:8px;align-items:center}
  .mail .mail-h:hover{background:#faf9f6}
  .mail .m-sub{font-size:12.5px;font-weight:650;line-height:1.35}
  .mail .m-dir{font-size:10px;font-weight:800;letter-spacing:.05em;padding:2px 8px;border-radius:99px;flex-shrink:0}
  .m-dir.out{background:var(--accent-soft);color:var(--accent)} .m-dir.in{background:var(--good-soft);color:var(--good)}
  .mail .mail-b{display:none;border-top:1px solid var(--line);padding:11px 14px;font-size:12.5px;line-height:1.62;background:#fbfaf8}
  .mail.open .mail-b{display:block}
  .mail .m-meta{font-size:10.5px;color:var(--ink-3);font-family:ui-monospace,Menlo,monospace;line-height:1.6;border-bottom:1px dashed var(--line);padding-bottom:8px;margin-bottom:9px}
  /* ---------- 4. Task detail sheet (modal) ---------- */
  .sheet-bg{position:fixed;inset:0;background:rgba(28,28,30,.38);display:none;align-items:center;justify-content:center;z-index:20;padding:20px}
  .sheet-bg.open{display:flex}
  .sheet{background:var(--panel);border-radius:18px;width:min(860px,96vw);max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 70px rgba(0,0,0,.28)}
  .t-head{padding:20px 26px 14px;border-bottom:1px solid var(--line);position:relative}
  .t-crumb{font-size:11px;color:var(--ink-3);margin-bottom:6px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .t-crumb .tid{font-family:ui-monospace,Menlo,monospace;background:#f1efe9;border-radius:5px;padding:1px 6px}
  .t-head h3{font-size:19px;font-weight:800;letter-spacing:-.01em;line-height:1.3}
  .t-body{display:flex;min-height:0;flex:1}
  .t-main{flex:1;min-width:0;overflow-y:auto;padding:18px 26px}
  .t-side{width:270px;flex-shrink:0;border-left:1px solid var(--line);padding:18px 20px;overflow-y:auto;background:#fbfaf8}
  .t-sec{font-size:10.5px;font-weight:800;letter-spacing:.07em;color:var(--ink-3);text-transform:uppercase;margin-bottom:10px}
  .f-row{margin-bottom:14px}
  .f-row .f-k{font-size:10.5px;font-weight:700;letter-spacing:.06em;color:var(--ink-3);text-transform:uppercase;margin-bottom:3px}
  .f-row .f-v{font-size:13px;font-weight:600}
  .fields-compact{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;margin-bottom:4px}
  .agent-chip{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600}
  .agent-chip .av{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:800}
  .side-sec{font-size:10.5px;font-weight:800;letter-spacing:.07em;color:var(--ink-3);text-transform:uppercase;margin:16px 0 7px}
  .side-check .s-item{padding:6px 0;font-size:12.5px}
  .s-item{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
  .s-item .box{width:18px;height:18px;border-radius:6px;border:1.5px solid #d5d2ca;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:1px}
  .s-item.done .box{background:var(--good);border-color:var(--good);color:#fff}
  .t-desc{font-size:13.5px;line-height:1.6;color:var(--ink)}
  .sub-row{border:1px solid var(--line);border-radius:11px;padding:10px 13px;margin-bottom:8px;cursor:pointer;background:var(--panel)}
  .sub-row:hover{box-shadow:0 2px 8px rgba(0,0,0,.05)}

      const cap=showAll.has(key)?extraRepos.length:6;
      for(const r of extraRepos.slice(0,cap)){
        const id='repo:'+r.r;
        const d=document.createElement('div');d.className='repo-row'+(current===id?' active':'');
        d.draggable=true;
        d.innerHTML=`<span>⋮⋮ ${humanize(r.r)}</span><span class="r-d">${r.r}</span>`;
        d.onclick=e=>{e.stopPropagation();DATA[id]=DATA[id]||repoProject(org,agent,r.r,r.d,r.tk);current=id;renderAll();};
        d.ondragstart=e=>e.dataTransfer.setData('repo',r.r);
        kids.appendChild(d);
      }
      if(extraRepos.length>6&&!showAll.has(key)){
        const m=document.createElement('div');m.className='showmore';m.textContent=`Show all ${extraRepos.length}…`;
        m.onclick=()=>{showAll.add(key);renderSidebar();};
        kids.appendChild(m);
      }
      sb.appendChild(kids);
    }
  }
  renderNeedsYou();
}
function srcChip(src){
  if(!src)return'';
  return `<span class="src-chip" onclick="openArtifact(${JSON.stringify(src).replace(/"/g,'&quot;')})">${src.kind==='email'?'✉️':'📄'} source</span>`;
}
function openArtifact(a){
  const sh=$('sheet');
  sh.innerHTML=`<button class="t-close" onclick="document.getElementById('sheetBg').classList.remove('open')">×</button>
    <div class="t-head"><div class="t-crumb">${DATA[current].org} / ${DATA[current].name} / Artifact</div><h3>${a.title}</h3></div>
    <div class="t-main" style="padding:20px 26px;overflow-y:auto"><div class="t-desc">${a.body}</div></div>`;
  $('sheetBg').classList.add('open');
}
function parseWhen(t){
  const m=(t||'').match(/([A-Z][a-z]{2}) (\d{1,2})(?: · (\d{1,2}):(\d{2}) (AM|PM))?/);
  if(!m)return 0;
  let h=m[3]?+m[3]:12; if(m[5]==='PM'&&h<12)h+=12; if(m[5]==='AM'&&h===12)h=0;
  return new Date(`${m[1]} ${m[2]} 2026 ${h}:${m[4]||'00'}`).getTime();
}
function buildLog(p){
  const rows=[];
  for(const t of p.tasks)for(const h of (t.history||[])){
    const isMail=h.artifact&&h.artifact.kind==='email';
    rows.push({when:parseWhen(h.t),t:h.t,who:h.who,what:h.what,ev:h.ev,artifact:h.artifact,
      cat:isMail?'comms':(h.type==='human'?'decisions':'events'),task:t.name});
  }
  for(const m of p.msgs){ if(m.decision)rows.push({when:Date.now(),t:'now',who:p.agent,what:'<b>decision pending:</b> '+m.decision.q,cat:'decisions'}); }
  rows.sort((a,b)=>a.when-b.when);
  return rows;
}
function renderQuotes(p){
  const q=p.quotes; if(!q)return '<div class="empty">No quote economics in this project.</div>';
  const b=q.baseline;
  let h=`<div class="qb-h">Baseline — ${b.label}</div>
    <div class="q-base"><span class="qb-big">${b.premium}</span><span class="qb-sub">${b.carrier}</span>${srcChip(b.src)}
    <div class="q-note">${b.note}</div></div>
    <div class="qb-h" style="margin-top:16px">Quotes on the table</div><div class="qtable">`;
  for(const r of q.rows){
    h+=`<div class="card"><div class="c-top"><div><div class="q-carrier">${r.carrier}</div>
      <div class="q-note">${r.line} · ${r.rating} · limits ${r.limits} · ded ${r.ded}</div></div>
      <span class="pill ${r.status==='quoted'?'done':(r.status==='superseded'?'q':'prog')}">${r.status}</span></div>
      <div class="q-amt">${r.premium}${r.ill?' <span class="ill">illustrative</span>':''}</div>
      <div class="q-note">${r.sub} · <b>${r.freshness}</b> ${srcChip(r.src)}</div></div>`;
  }
  h+='</div>';
  const dp=q.decisionPackage;
  if(dp){h+=`<div class="dp-card"><div class="dp-tag">Decision package</div><div class="qb-h">${dp.title}</div>`+
    dp.points.map((pt,i)=>`<div class="dp-pt"><span class="dp-n">${i+1}</span>${pt}</div>`).join('')+'</div>';}
  return h;
}
function renderMain(){
  const p=DATA[current];
  $('crumb').textContent=`${p.org} / ${p.name}`+(p.repo?` · ${p.repo}`:'');
  $('pTitle').textContent=p.name; $('pRunby').textContent=`Run by ${p.agent}`;
  $('ctxChips').innerHTML=['macro rules',(p.repo||p.name.toLowerCase().replace(/ /g,'-'))+' board',p.agent.toLowerCase()+' corpus']
    .map(c=>`<span class="chip">${c}</span>`).join('')+`<span class="chip macro">context injected</span>`;
  const pl=$('pipeline'); pl.innerHTML='';
  p.phases.forEach((ph,i)=>{
    if(i>0){const g=document.createElement('div');g.className='gate'+(ph._fired?' fired':'');g.textContent=ph._fired?'✔':'➜';pl.appendChild(g);}
    const d=document.createElement('div');
    d.className='phase '+(ph.state==='human'?'human ':'')+(ph.state==='waiting'?'waiting ':'')+(ph.state==='active'?'active ':'')+(ph.state==='done-p'?'done-p':'');
    d.innerHTML=`<div class="ph-name">${ph.name}</div><div class="ph-meta">${ph.meta}</div>`+
      (ph.state!=='human'?`<div class="bar"><i style="width:${ph.pct}%"></i></div>`:'');
    pl.appendChild(d);
  });
  $('rollup').innerHTML=`<span>Overall <b>${p.overall}</b></span><span>${p.remaining}</span>`;
  const arts=projectArtifacts(p);
  const hasQ=!!p.quotes;
  $('boardWrap').innerHTML=`<div class="tabs">
    <span class="tab ${mainTab==='board'?'on':''}" data-t="board">Board</span>
    ${hasQ?`<span class="tab ${mainTab==='quotes'?'on':''}" data-t="quotes">Quotes</span>`:''}
    <span class="tab ${mainTab==='artifacts'?'on':''}" data-t="artifacts">Artifacts · ${arts.length}</span>
    <span class="tab ${mainTab==='log'?'on':''}" data-t="log">Log</span>
  </div><div id="tabBody"></div>`;
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{mainTab=t.dataset.t;renderMain();});
  const body=$('tabBody');
  if(mainTab==='quotes'&&hasQ){body.innerHTML=renderQuotes(p);return;}
  if(mainTab==='artifacts'){
    body.innerHTML=arts.length?`<div class="art-grid">${arts.map((a,i)=>
      `<div class="art-card" data-i="${i}"><div class="a-kind">${a.kind==='email'?'✉️ Email':'📄 Document'}</div>
       <div class="a-title">${a.title}</div><div class="a-src">from ${a.src}</div></div>`).join('')}</div>`
      :'<div class="empty">No artifacts produced in this project yet.</div>';
    body.querySelectorAll('.art-card').forEach(c=>c.onclick=()=>openArtifact(arts[+c.dataset.i]));
    return;
  }
  if(mainTab==='log'){
    const rows=buildLog(p);
    body.innerHTML=`<div class="chips">${['all','comms','decisions','events'].map(f=>
      `<span class="chip ${logFilter===f?'macro':''}" data-f="${f}">${f[0].toUpperCase()+f.slice(1)}</span>`).join('')}</div>
      <div class="tl" style="margin-top:12px">${rows.filter(r=>logFilter==='all'||r.cat===logFilter).map(r=>{
        if(r.artifact&&r.artifact.kind==='email'){
          const recv=/received|replied|delivered \d|from the broker/i.test(r.what)||r.who==='Broker'||/Insureon|Vouch|Embroker|Next/.test(r.who);
          return `<div class="tl-item ${recv?'recv':'sent'}"><span class="tl-dot"></span>
            <div class="tl-meta"><b>${r.who}</b> <span class="tl-what">${r.what}</span> · ${r.t}${r.ev?' · '+r.ev:''} <i>(${r.task||''})</i></div>
            <div class="mail"><div class="mail-h" onclick="this.parentElement.classList.toggle('open')">
              <span class="m-sub">${r.artifact.title}</span><span class="m-dir ${recv?'in':'out'}">${recv?'RECEIVED':'SENT'}</span></div>
              <div class="mail-b">${r.artifact.body}</div></div></div>`;
        }
        return `<div class="tl-item ${r.cat==='decisions'?'human':''}"><span class="tl-dot"></span>
          <div class="tl-meta"><b>${r.who}</b> <span class="tl-what">${r.what}</span> · ${r.t}${r.ev?' · '+r.ev:''}${r.task?` <i>(${r.task})</i>`:''}
          ${r.artifact?srcChip(r.artifact):''}</div></div>`;
      }).join('')||'<div class="empty">Nothing in this filter yet.</div>'}</div>`;
    body.querySelectorAll('.chips .chip').forEach(c=>c.onclick=()=>{logFilter=c.dataset.f;renderMain();});
    return;
  }
  if(!p.tasks.length){body.innerHTML='<div class="empty">Nothing on the board yet — message '+p.agent+' to start work here.</div>';return;}
  const cols=[['q','To do'],['prog','In progress'],['done','Complete']];
  body.innerHTML=`<div class="kanban">${cols.map(([k,label])=>{
    const ts=p.tasks.filter(t=>statusOf(t)===k);
    return `<div class="kcol" data-col="${k}"><div class="k-h"><span>${label}</span><span>${ts.length}</span></div>
      ${ts.map(t=>`<div class="card" draggable="true" data-task="${t.id}">${cardHTML(t)}</div>`).join('')}</div>`;}).join('')}</div>`;
  body.querySelectorAll('.card').forEach(c=>{
    c.onclick=()=>openSheet(p.tasks.find(t=>t.id===c.dataset.task));
    c.ondragstart=e=>{e.dataTransfer.setData('task',c.dataset.task);c.classList.add('dragging');};
    c.ondragend=()=>c.classList.remove('dragging');
  });
  body.querySelectorAll('.kcol').forEach(col=>{
    col.ondragover=e=>{e.preventDefault();col.classList.add('dragover');};
    col.ondragleave=()=>col.classList.remove('dragover');
    col.ondrop=e=>{e.preventDefault();col.classList.remove('dragover');
      const t=p.tasks.find(x=>x.id===e.dataTransfer.getData('task')); if(!t)return;
      const k=col.dataset.col;
      t.doneCount=k==='done'?t.total:(k==='prog'?Math.max(1,Math.min(t.doneCount,t.total-1)):0);
      toast(`${t.name} → ${k==='done'?'Complete':(k==='prog'?'In progress':'To do')} (mockup — live build writes to ClickUp)`);
      renderMain();};
  });
}
function buildDecision(dec){
  const wrap=document.createElement('div');wrap.className='m';wrap.style.maxWidth='100%';
  wrap.innerHTML=`<div class="decision ${dec.answered?'answered':''}" id="dec-${dec.id}">
    <div class="d-tag">${dec.tag||'Decision needed'}</div>
    <div class="d-q">${dec.q}</div>
    <div class="d-ctx">${dec.ctx}</div>
    ${dec.options.map((o,i)=>`<button class="opt" data-i="${i}">${o.label}${o.rec?' <span class="rec">RECOMMENDED</span>':''}<span class="sub">${o.sub}</span></button>`).join('')}
    <div class="d-state">Answered ✓ · relayed to ${DATA[current].agent}'s live session · exactly-once</div>
    <div class="d-foot">timeout fails open to the session's own prompt · double-answer returns 409</div></div>`;
  wrap.querySelectorAll('.opt').forEach(btn=>btn.onclick=()=>answerDecision(dec,btn));
  return wrap;
}
function answerDecision(dec,btn){
  const el=document.getElementById('dec-'+dec.id);
  if(dec.answered)return; dec.answered=true;
  el.classList.add('answered'); btn.classList.add('chosen');
  toast(`Answered ✓ · relayed to ${DATA[current].agent}'s live session · exactly-once`);
  const p=DATA[current]; p.needsClear=true; p.needs='Nothing needed from you right now.';
  const needs=$('needs'); needs.className='needs clear'; needs.innerHTML='✓ <span>Nothing needed from you right now.</span>';
  renderNeedsYou();
  const wait=btn.textContent.startsWith('Wait');
  setTimeout(()=>{addMsg(p.agent+' · just now', wait
    ?`Understood — holding for Embroker's corrected re-quote (due <b>tomorrow, Jul 16</b>). The moment it lands I'll run the 5-point comparison against PHLY and bring you the decision package. Nudge cadence stays armed if they slip.`
    :`Locking in <b>Insureon/PHLY Tech E&O at $2,538/yr</b>. I'll prep the bind package now — the bind/pay/sign step still comes to you as a hard gate; nothing gets signed without you.`);},900);
  setTimeout(()=>{
    const p2=DATA.insurance;
    p2.phases[5]={name:'Comparison',meta:wait?'armed — runs when Embroker lands':'running now',pct:wait?30:60,state:'active',_fired:true};
    if(current==='insurance')renderMain();
    addMsg(p2.agent+' · just now','Pipeline updated — <b>Comparison phase is armed</b>. You can watch it on the strip above.');
  },2400);
}
function addMsg(who,html){
  DATA[current].msgs.push({who,html});
  const d=document.createElement('div');d.className='m';
  d.innerHTML=`<div class="who">${who}</div><div class="bubble">${html}</div>`;
  $('msgs').appendChild(d); $('msgs').scrollTop=1e6;
}
function renderChat(){
  const p=DATA[current];
  $('chatAgent').textContent=p.agent; $('chatRole').textContent=p.role;
  const needs=$('needs');
  needs.className='needs'+(p.needsClear?' clear':'');
  needs.innerHTML=(p.needsClear?'✓ ':'🧑‍💼 ')+`<span>${p.needs}</span>`;
  const msgs=$('msgs'); msgs.innerHTML='';
  for(const m of p.msgs){
    if(m.decision){msgs.appendChild(buildDecision(m.decision));continue;}
    if(m.pair){
      const d=document.createElement('div');d.className='m you';d.style.maxWidth='100%';
      d.innerHTML=`<div class="who">You · multi-point</div><div class="pairwrap">`+
        m.pairs.map(pr=>`<div class="pw-h"><span class="p-lab">${pr.lab}</span><div class="p-q">${pr.q}</div><div class="p-a">${pr.a}</div></div>`).join('')+`</div>`;
      msgs.appendChild(d);continue;
    }
    const d=document.createElement('div');d.className='m'+(m.you?' you':'');
    d.innerHTML=`<div class="who">${m.who}</div><div class="bubble">${m.html}</div>`;
    msgs.appendChild(d);
  }
  msgs.scrollTop=msgs.scrollHeight;
  $('peekBtn').innerHTML=`••• Engine room — append-only ledger (deterministic) · ${p.engine.length} entries`;
  const eng=$('engine'); eng.classList.remove('open');
  eng.innerHTML=p.engine.map(e=>`<div class="e-row"><span class="e-id">${(e[2].match(/event #\d+/)||[''])[0]}</span> ${e[0]} · <span class="e-rule">${e[1]}</span> · ${e[2]}</div>`).join('');
}
function openSheet(t){
  const p=DATA[current], agent=p.agent;
  const done=t.doneCount>=t.total;
  const hist=t.history||[];
  const s=$('sheet');
  s.innerHTML=`
    <button class="t-close" onclick="document.getElementById('sheetBg').classList.remove('open')">×</button>
    <div class="t-head" style="position:relative">
      <div class="t-crumb">${p.org} / ${p.name} <span class="tid">${t.id}</span></div><h3>${t.name}</h3>
    </div>
    <div class="t-body">
      <div class="t-main">
        <div class="t-sec">Timeline — full comms log</div>
        <div class="tl">${hist.length?hist.map(h=>{
          if(h.artifact&&h.artifact.kind==='email'){
            const recv=h.who==='Broker'||/Insureon|Vouch|Embroker|Next|replied|delivered/i.test(h.who+h.what);
            return `<div class="tl-item ${recv?'recv':'sent'}"><span class="tl-dot"></span>
              <div class="tl-meta"><b>${h.who}</b> <span class="tl-what">${h.what}</span> · ${h.t}${h.ev?' · '+h.ev:''}</div>
              <div class="mail open"><div class="mail-h" onclick="this.parentElement.classList.toggle('open')">
                <span class="m-sub">${h.artifact.title}</span><span class="m-dir ${recv?'in':'out'}">${recv?'RECEIVED':'SENT'}</span></div>
                <div class="mail-b">${h.artifact.body}</div></div></div>`;
          }
          return `<div class="tl-item ${h.type==='human'?'human':(h.type==='good'?'sent':'')}"><span class="tl-dot"></span>
            <div class="tl-meta"><b>${h.who}</b> <span class="tl-what">${h.what}</span> · ${h.t}${h.ev?' · '+h.ev:''}</div>
            ${h.artifact?srcChip(h.artifact):''}</div>`;
        }).join(''):'<div class="empty">No activity mirrored yet.</div>'}</div>
      </div>
      <div class="t-side">
        <div class="fields-compact">
          <div class="f-row"><div class="f-k">Status</div><div class="f-v"><span class="pill ${done?'done':(t.doneCount>0?'prog':'q')}">${done?'Done':(t.doneCount>0?'In progress':'Queued')}</span></div></div>
          <div class="f-row"><div class="f-k">Agent</div><div class="f-v"><span class="agent-chip"><span class="av">${agent[0].toUpperCase()}</span>${agent}</span></div></div>
          <div class="f-row"><div class="f-k">Priority</div><div class="f-v">${t.priority==='Urgent'?'🔴 Urgent':(t.priority||'Normal')}</div></div>
          <div class="f-row"><div class="f-k">Due</div><div class="f-v">${t.due||'—'}</div></div>
        </div>
        <div class="bar" style="margin-top:6px"><i style="width:${Math.round(t.doneCount/t.total*100)}%"></i></div>
        <div class="side-sec">Task list · ${t.doneCount}/${t.total} complete</div>
        ${t.items&&t.items.length?t.items.map((it,i)=>`<div class="s-item ${i<t.doneCount?'done':''}"><div class="box">${i<t.doneCount?'✓':''}</div><div>${typeof it==='string'?it:it.name}</div></div>`).join('')
          :(t.checklistCount?`<div class="genchk">${t.checklistCount} checklist items on the live board</div>`:'<div class="genchk">No checklist on this task.</div>')}
        <div class="side-sec">Description</div>
        <div style="font-size:12px;color:var(--ink-2);line-height:1.55">${t.desc}</div>
      </div>
    </div>
    <div class="t-foot"><input placeholder="Comment — goes to ${agent} and onto the task…" onkeydown="if(event.key==='Enter'&&this.value.trim()){toast('Comment posted to the task (mockup)');this.value='';}"></div>`;
  $('sheetBg').classList.add('open');
}
$('sheetBg').onclick=e=>{if(e.target.id==='sheetBg')$('sheetBg').classList.remove('open');};
$('peekBtn').onclick=()=>$('engine').classList.toggle('open');
$('chatToggle').onclick=()=>{document.querySelector('.chat').classList.toggle('collapsed');};
$('composerInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&e.target.value.trim()){
    const t=e.target.value; e.target.value='';
    const d=document.createElement('div');d.className='m you';
    d.innerHTML=`<div class="who">You</div><div class="bubble">${t.replace(/</g,'&lt;')}</div>`;
    $('msgs').appendChild(d);$('msgs').scrollTop=1e6;
    setTimeout(()=>addMsg(DATA[current].agent+' · just now','(mockup) In the live build this starts or resumes my session and I answer here.'),700);
  }
});
function toastEl(){return $('banner');}
function renderAll(){renderSidebar();renderMain();renderChat();}
renderAll();
</script>
</body>
