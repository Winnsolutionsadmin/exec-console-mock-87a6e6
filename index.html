<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Console — mockup v2</title>
<style>
  :root{
    --bg:#f7f6f3; --panel:#ffffff; --ink:#1c1c1e; --ink-2:#6e6e73; --ink-3:#a1a1a6;
    --line:#e8e6e1; --accent:#2f6fed; --accent-soft:#eaf1fe;
    --human:#a07440; --human-soft:#f5ede2;
    --good:#2e9e6b; --good-soft:#e7f5ee;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;
    display:flex; height:100vh; overflow:hidden;
  }
  /* ---------- 1. Selector ---------- */
  aside{
    width:224px; flex-shrink:0; border-right:1px solid var(--line);
    padding:22px 12px; overflow-y:auto;
  }
  aside h1{font-size:15px; font-weight:700; padding:0 10px 14px; letter-spacing:-.01em}
  .org{font-size:10.5px;font-weight:700;letter-spacing:.09em;color:var(--ink-3);padding:14px 10px 6px;text-transform:uppercase}
  .proj{display:flex;flex-direction:column;gap:1px;padding:8px 10px;border-radius:10px;cursor:pointer;user-select:none}
  .proj:hover{background:#efede9}
  .proj.active{background:var(--accent-soft)}
  .proj .p-name{font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:6px}
  .proj.active .p-name{color:var(--accent)}
  .proj .p-agent{font-size:11.5px;color:var(--ink-2)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--human);flex-shrink:0}
  .dot.ok{background:#d3d0c9}
  /* ---------- 2. Chat (between selector and board) ---------- */
  .chat{
    width:372px;flex-shrink:0;border-right:1px solid var(--line);
    display:flex;flex-direction:column;background:var(--panel);min-width:0;
  }
  .chat-head{padding:15px 18px 0}
  .chat-head .agent{font-size:15px;font-weight:800}
  .chat-head .role{font-size:11.5px;color:var(--ink-2);margin-bottom:11px}
  .needs{
    padding:11px 18px;font-size:12.5px;font-weight:700;border-top:1px solid var(--line);border-bottom:1px solid var(--line);
    background:var(--human-soft);color:var(--human);display:flex;gap:8px;align-items:center;transition:all .5s ease;
  }
  .needs.clear{background:var(--good-soft);color:var(--good)}
  .msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
  .m{max-width:94%}
  .m .who{font-size:11px;color:var(--ink-3);margin-bottom:3px;font-weight:600}
  .m .bubble{background:#f4f2ee;border-radius:14px;padding:10px 13px;font-size:13px;line-height:1.5}
  .m.you{align-self:flex-end}
  .m.you .bubble{background:var(--accent);color:#fff}
  .m.you .who{text-align:right}
  .decision{border:1.5px solid #e5d5bd;background:var(--human-soft);border-radius:16px;padding:13px 15px}
  .decision .d-tag{font-size:10.5px;font-weight:800;letter-spacing:.07em;color:var(--human);text-transform:uppercase;margin-bottom:6px}
  .decision .d-q{font-size:13px;font-weight:700;margin-bottom:4px;line-height:1.4}
  .decision .d-ctx{font-size:12px;color:var(--ink-2);line-height:1.5;margin-bottom:10px}
  .opt{display:block;width:100%;text-align:left;font:inherit;font-size:12.5px;font-weight:600;
    background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:9px 12px;margin-bottom:7px;cursor:pointer;transition:all .15s ease}
  .opt:hover{border-color:var(--human)}
  .opt .rec{font-size:9.5px;font-weight:800;color:var(--human);letter-spacing:.05em;margin-left:6px}
  .opt .sub{display:block;font-size:11px;color:var(--ink-2);font-weight:500;margin-top:2px}
  .decision.answered .opt{opacity:.45;pointer-events:none}
  .decision.answered .opt.chosen{opacity:1;border-color:var(--good);background:var(--good-soft)}
  .d-state{font-size:11.5px;color:var(--good);font-weight:700;margin-top:4px;display:none}
  .decision.answered .d-state{display:block}
  .peek{font-size:11px;color:var(--ink-3);text-align:center;padding:7px;cursor:pointer;user-select:none;border-top:1px solid var(--line)}
  .peek:hover{color:var(--ink-2)}
  .engine{display:none;max-height:170px;overflow-y:auto;border-top:1px solid var(--line);background:#faf9f7;padding:10px 16px}
  .engine.open{display:block}
  .engine .e-row{font-size:11px;color:var(--ink-2);padding:4px 0;border-bottom:1px dashed var(--line);font-family:ui-monospace,Menlo,monospace}
  .engine .e-rule{color:var(--human);font-weight:700}
  .composer{border-top:1px solid var(--line);padding:11px 14px;display:flex;gap:8px}
  .composer input{flex:1;font:inherit;font-size:13px;border:1px solid var(--line);border-radius:99px;padding:9px 15px;outline:none;background:var(--bg)}
  .composer input:focus{border-color:var(--accent)}
  /* ---------- 3. Main: pipeline + board ---------- */
  main{flex:1;min-width:0;padding:24px 28px;overflow-y:auto}
  .crumb{font-size:12px;color:var(--ink-3);margin-bottom:4px}
  .title-row{display:flex;align-items:baseline;gap:10px;margin-bottom:18px}
  .title-row h2{font-size:24px;font-weight:800;letter-spacing:-.02em}
  .title-row .runby{font-size:13px;color:var(--ink-2)}
  .pipeline{display:flex;align-items:stretch;margin-bottom:8px;flex-wrap:wrap;row-gap:12px}
  .phase{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:13px 16px;min-width:168px;transition:all .5s ease;cursor:pointer}
  .phase:hover{box-shadow:0 3px 12px rgba(0,0,0,.05)}
  .phase .ph-name{font-size:13.5px;font-weight:700;margin-bottom:2px}
  .phase .ph-meta{font-size:11.5px;color:var(--ink-2);margin-bottom:8px}
  .bar{height:5px;border-radius:3px;background:#eeece7;overflow:hidden}
  .bar i{display:block;height:100%;border-radius:3px;background:var(--accent);transition:width .8s ease}
  .phase.active{border-color:var(--accent);box-shadow:0 1px 10px rgba(47,111,237,.10)}
  .phase.waiting{opacity:.62}
  .phase.selected{outline:2px solid var(--accent);outline-offset:1px}
  .phase.human{background:var(--human-soft);border-color:#e5d5bd}
  .phase.human .ph-name{color:var(--human)}
  .gate{align-self:center;width:40px;display:flex;align-items:center;justify-content:center;color:var(--ink-3);font-size:15px;transition:color .6s ease}
  .gate.fired{color:var(--good)}
  .rollup{display:flex;gap:20px;align-items:center;border-top:1px solid var(--line);margin:13px 0 22px;padding-top:11px;font-size:12.5px;color:var(--ink-2);flex-wrap:wrap}
  .rollup b{color:var(--ink);font-weight:700}
  .section-h{font-size:14.5px;font-weight:800;margin-bottom:11px}
  .board{display:grid;grid-template-columns:repeat(auto-fill,minmax(236px,1fr));gap:11px;margin-bottom:20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:13px 15px;cursor:pointer;transition:transform .12s ease,box-shadow .12s ease}
  .card:hover{transform:translateY(-1px);box-shadow:0 3px 14px rgba(0,0,0,.06)}
  .c-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;margin-bottom:7px}
  .c-name{font-size:12.5px;font-weight:650;line-height:1.35}
  .pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;white-space:nowrap}
  .pill.prog{background:var(--accent-soft);color:var(--accent)}
  .pill.done{background:var(--good-soft);color:var(--good)}
  .pill.q{background:#f1efe9;color:var(--ink-2)}
  .c-check{font-size:11px;color:var(--ink-2);margin-top:6px}
  .c-check .next{color:var(--ink);font-weight:600}
  .ticks{letter-spacing:2px;font-size:10.5px;margin-top:5px}
  .ticks .on{color:var(--good)} .ticks .off{color:#d5d2ca}
  .empty{font-size:13px;color:var(--ink-2);padding:20px;border:1px dashed var(--line);border-radius:var(--radius);background:var(--panel)}
  /* task detail (ClickUp-grade) */
  .sheet-bg{position:fixed;inset:0;background:rgba(28,28,30,.38);display:none;align-items:center;justify-content:center;z-index:20;padding:20px}
  .sheet-bg.open{display:flex}
  .sheet{background:var(--panel);border-radius:18px;width:min(820px,96vw);max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 70px rgba(0,0,0,.28)}
  .t-head{padding:20px 26px 14px;border-bottom:1px solid var(--line)}
  .t-crumb{font-size:11px;color:var(--ink-3);margin-bottom:6px;display:flex;gap:6px;align-items:center}
  .t-crumb .tid{font-family:ui-monospace,Menlo,monospace;background:#f1efe9;border-radius:5px;padding:1px 6px}
  .t-head h3{font-size:19px;font-weight:800;letter-spacing:-.01em;line-height:1.3}
  .t-body{display:flex;min-height:0;flex:1}
  .t-main{flex:1;min-width:0;overflow-y:auto;padding:18px 26px}
  .t-side{width:230px;flex-shrink:0;border-left:1px solid var(--line);padding:18px 20px;overflow-y:auto;background:#fbfaf8}
  .f-row{margin-bottom:14px}
  .f-row .f-k{font-size:10.5px;font-weight:700;letter-spacing:.06em;color:var(--ink-3);text-transform:uppercase;margin-bottom:3px}
  .f-row .f-v{font-size:13px;font-weight:600}
  .f-v .pill{vertical-align:1px}
  .agent-chip{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600}
  .agent-chip .av{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:800}
  .t-sec{font-size:11px;font-weight:800;letter-spacing:.07em;color:var(--ink-3);text-transform:uppercase;margin:18px 0 9px}
  .t-sec:first-child{margin-top:0}
  .t-desc{font-size:13.5px;line-height:1.6;color:var(--ink)}
  .s-item{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
  .s-item .box{width:18px;height:18px;border-radius:6px;border:1.5px solid #d5d2ca;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:1px}
  .s-item.done .box{background:var(--good);border-color:var(--good);color:#fff}
  .s-item .ev{display:block;font-size:11px;color:var(--ink-3);margin-top:2px}
  /* activity timeline */
  .act{position:relative;padding-left:24px}
  .act::before{content:'';position:absolute;left:8px;top:6px;bottom:6px;width:2px;background:var(--line);border-radius:2px}
  .a-row{position:relative;padding:7px 0;font-size:12.5px;color:var(--ink-2);line-height:1.45}
  .a-row b{color:var(--ink);font-weight:650}
  .a-row .a-dot{position:absolute;left:-21.5px;top:12px;width:9px;height:9px;border-radius:50%;background:#d5d2ca;border:2px solid var(--panel)}
  .a-row.milestone .a-dot{background:var(--accent)}
  .a-row.human .a-dot{background:var(--human)}
  .a-row.good .a-dot{background:var(--good)}
  .a-row .a-t{font-size:10.5px;color:var(--ink-3);margin-left:6px;white-space:nowrap}
  .a-row .a-quote{display:block;background:#f4f2ee;border-radius:9px;padding:7px 11px;margin-top:5px;color:var(--ink);font-size:12.5px}
  .t-foot{border-top:1px solid var(--line);padding:12px 26px;display:flex;gap:9px;align-items:center}
  .t-foot input{flex:1;font:inherit;font-size:13px;border:1px solid var(--line);border-radius:10px;padding:9px 13px;outline:none;background:var(--bg)}
  .t-foot input:focus{border-color:var(--accent)}
  .t-close{position:absolute;top:14px;right:18px;font-size:20px;color:var(--ink-3);cursor:pointer;background:none;border:none;line-height:1}
  .t-close:hover{color:var(--ink)}
  @media (max-width:760px){ .t-body{flex-direction:column} .t-side{width:100%;border-left:0;border-top:1px solid var(--line);display:flex;flex-wrap:wrap;gap:0 26px} .f-row{min-width:130px} }
  .banner{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:12px;font-weight:600;border-radius:99px;padding:7px 16px;opacity:0;transition:opacity .4s;pointer-events:none;z-index:30}
  .banner.show{opacity:.92}
  .mock-tag{position:fixed;bottom:10px;right:12px;font-size:10px;color:var(--ink-3)}
  @media (max-width:1120px){ .chat{width:320px} }
  @media (max-width:900px){
    body{flex-direction:column;height:auto;overflow:auto}
    aside{width:100%;display:flex;gap:2px;overflow-x:auto;padding:10px;border-right:0;border-bottom:1px solid var(--line);align-items:center}
    aside h1{display:none}.org{padding:0 8px;white-space:nowrap}.proj{white-space:nowrap}
    .chat{width:100%;border-right:0;border-bottom:1px solid var(--line);max-height:64vh}
    main{padding:16px}
  }
</style>
</head>
<body>

<aside id="sidebar"><h1>Executive Console</h1></aside>

<div class="chat">
  <div class="chat-head"><div class="agent" id="chatAgent"></div><div class="role" id="chatRole"></div></div>
  <div class="needs" id="needs"></div>
  <div class="msgs" id="msgs"></div>
  <div class="peek" id="peekBtn"></div>
  <div class="engine" id="engine"></div>
  <div class="composer"><input placeholder="Message…" id="composer"></div>
</div>

<main>
  <div class="crumb" id="crumb"></div>
  <div class="title-row"><h2 id="pTitle"></h2><span class="runby" id="pRunby"></span></div>
  <div class="pipeline" id="pipeline"></div>
  <div class="rollup" id="rollup"></div>
  <div id="boardWrap"></div>
</main>

<div class="sheet-bg" id="sheetBg"><div class="sheet" id="sheet"></div></div>
<div class="banner" id="banner">Delivered to the live session — exactly once</div>
<div class="mock-tag">MOCKUP v2 · executive-agent-gui</div>

<script>
const CHECK5=['draft','approved','sent','reply received','data extracted'];
let TID=104;
function task(name,doneCount,note,items,extra){
  const t={name,doneCount,total:(items||CHECK5).length,note,items:items||CHECK5,
    id:'TASK-'+(TID++),priority:'Normal',due:'Jul 18',created:'Jul 11',
    desc:'Owned end-to-end by the assigned agent; every state change below is a ledger event you can audit.',
    history:null,...(extra||{})};
  return t;
}
function genHistory(t,agent){
  if(t.history)return t.history;
  const h=[{type:'milestone',who:agent,what:'created this task and set the checklist',t:t.created+' · 9:04 AM'}];
  t.items.forEach((it,i)=>{ if(i<t.doneCount) h.push({type:'good',who:agent,what:`completed <b>${it}</b>`,t:'Jul '+(12+Math.min(i,2))+' · '+(9+i)+':'+(17+i*9)+' AM',ev:'event #'+(1000+i*7)}); });
  if(t.doneCount<t.total) h.push({type:'',who:agent,what:`is working on <b>${t.items[t.doneCount]}</b> — in progress now`,t:'today'});
  else h.push({type:'milestone',who:agent,what:'marked the task <b>Done</b> — data pushed to the next phase',t:'today · 1:12 PM'});
  return h;
}

const DATA={
  insurance:{org:'General',name:'Insurance',agent:'Drake',role:'Insurance operator — coverage, brokers, placements',

        id:'WINN-INS-002',priority:'Urgent',due:'Jul 15',created:'Jul 10',
        desc:'Place CA Workers Comp for 4 W2 employees (statutory gap). Hartford quoted through the Bunker ministerial channel. Quote came in 12% under budget, carrier A+ rated by AM Best, able to bind this week.',

  winnops:{org:'Winn.solutions',name:'Operations',agent:'Hermes',role:'Chase operator — vendors, disputes, follow-through',

    phases:[

const ORDER=['insurance','houseops','anchorage','winnops','gmads','gmops','kindred','gmweb'];
let current='insurance';
const $=id=>document.getElementById(id);

function renderSidebar(){
  const sb=$('sidebar'); sb.innerHTML='<h1>Executive Console</h1>';
  let lastOrg='';
  for(const key of ORDER){
    const p=DATA[key];
    if(p.org!==lastOrg){lastOrg=p.org;const o=document.createElement('div');o.className='org';o.textContent=p.org;sb.appendChild(o);}
    const d=document.createElement('div');d.className='proj'+(key===current?' active':'');
    d.innerHTML=`<span class="p-name"><span class="dot ${p.needsClear?'ok':''}"></span>${p.name}</span><span class="p-agent">${p.agent}</span>`;
    d.onclick=()=>{current=key;renderAll();};
    sb.appendChild(d);
  }
}
function renderMain(){
  const p=DATA[current];
  $('crumb').textContent=`${p.org} / ${p.name}`;
  $('pTitle').textContent=p.name; $('pRunby').textContent=`Run by ${p.agent}`;
  const pl=$('pipeline'); pl.innerHTML='';
  p.phases.forEach((ph,i)=>{
    if(i>0){const g=document.createElement('div');g.className='gate'+(ph._fired?' fired':'');g.textContent=ph._fired?'✔':'➜';g.id='gate'+i;pl.appendChild(g);}
    const d=document.createElement('div');
    d.className='phase '+(ph.state==='human'?'human ':'')+(ph.state==='waiting'?'waiting':'')+(ph.state==='active'?'active':'');
    d.id='phase'+i;
    d.innerHTML=(ph.state==='human'?'<div style="font-size:18px;margin-bottom:4px">🧑</div>':'')+
      `<div class="ph-name">${ph.name}</div><div class="ph-meta">${ph.meta}</div>`+
      (ph.state!=='human'?`<div class="bar"><i style="width:${ph.pct}%"></i></div>`:'');
    d.onclick=()=>{document.querySelectorAll('.phase').forEach(x=>x.classList.remove('selected'));d.classList.add('selected');
      $('boardTitle').textContent=ph.state==='human'?'Your review — what will arrive here':ph.name;
      toast(ph.state==='waiting'?'Phase is waiting on the gate before it':'Showing '+ph.name);};
    pl.appendChild(d);
  });
  $('rollup').innerHTML=`<span>Overall <b>${p.overall}</b></span><span>${p.remaining}</span>`;
  const bw=$('boardWrap');
  bw.innerHTML=`<div class="section-h" id="boardTitle">${p.boardTitle}</div><div class="board" id="board"></div>`;
  const b=$('board');
  if(!p.tasks.length){b.outerHTML='<div class="empty">Nothing on the board for this phase yet.</div>';return;}
  p.tasks.forEach((t,ti)=>{
    const done=t.doneCount>=t.total;
    const d=document.createElement('div');d.className='card';
    d.innerHTML=`<div class="c-top"><div class="c-name">${t.name}</div>
      <span class="pill ${done?'done':(t.doneCount>0?'prog':'q')}">${done?'Done':(t.doneCount>0?'In progress':'Queued')}</span></div>
      <div class="ticks"><span class="on">${'●'.repeat(t.doneCount)}</span><span class="off">${'●'.repeat(t.total-t.doneCount)}</span></div>
      <div class="c-check">${t.doneCount}/${t.total} · ${t.note}</div>`;
    d.onclick=()=>openSheet(t);
    b.appendChild(d);
  });
}
function renderChat(){
  const p=DATA[current];
  $('chatAgent').textContent=p.agent; $('chatRole').textContent=p.role;
  const needs=$('needs');
  needs.className='needs'+(p.needsClear?' clear':'');
  needs.innerHTML=(p.needsClear?'✓ ':'🧑‍💼 ')+`<span>${p.needs}</span>`;
  const msgs=$('msgs'); msgs.innerHTML='';
  for(const m of p.msgs){
    if(m.decision){msgs.appendChild(buildDecision());continue;}
    const d=document.createElement('div');d.className='m'+(m.you?' you':'');
    d.innerHTML=`<div class="who">${m.who}</div><div class="bubble">${m.html}</div>`;
    msgs.appendChild(d);
  }
  msgs.scrollTop=msgs.scrollHeight;
  $('peekBtn').textContent=`••• View engine room (${p.engine.length} updates suppressed today)`;
  const eng=$('engine'); eng.classList.remove('open');
  eng.innerHTML=p.engine.map(e=>`<div class="e-row">${e[0]} · <span class="e-rule">${e[1]}</span> · ${e[2]}</div>`).join('');
}
function buildDecision(){
  const wrap=document.createElement('div');wrap.className='m';wrap.style.maxWidth='100%';
  wrap.innerHTML=`<div class="decision" id="decision">
    <div class="d-tag">Decision needed</div>
    <div class="d-q">Choose between two Workers Comp carriers.</div>
    <div class="d-ctx">Both within budget. This is the last input before Drake starts the binding paperwork.</div>
    <button class="opt" data-pick="The Hartford">The Hartford <span class="rec">RECOMMENDED</span><span class="sub">12% under budget · A+ rated · binds this week</span></button>
    <button class="opt" data-pick="Travelers">Travelers<span class="sub">Slightly higher premium · broader endorsements</span></button>
    <div class="d-state">✓ Your decision was recorded — Drake is proceeding.</div></div>`;
  wrap.querySelectorAll('.opt').forEach(btn=>btn.onclick=()=>answer(btn));
  return wrap;
}
function answer(btn){
  const dec=$('decision'); if(dec.classList.contains('answered'))return;
  dec.classList.add('answered'); btn.classList.add('chosen'); toast('Delivered to Drake\'s live session — exactly once');
  const p=DATA.insurance; p.needsClear=true; p.needs='Nothing needed from you right now.';
  p.msgs=p.msgs.filter(m=>!m.decision); p.msgs.push({decisionAnswered:true});
  const needs=$('needs'); needs.className='needs clear'; needs.innerHTML='✓ <span>Nothing needed from you right now.</span>';
  setTimeout(()=>addMsg('Drake · just now',`Got it — binding Workers Comp with <b>${btn.dataset.pick}</b>. Paperwork is underway; I'll surface the certificate when it lands.`),900);
  setTimeout(fireGate,2600);
}
function fireGate(){
  const p=DATA.insurance;
  p.tasks[4].doneCount=5;p.tasks[4].note='quote received · <span class="next">pushed to aggregation</span>';
  p.phases[0]={name:'Broker outreach',meta:'5 of 5 done · Complete',pct:100,state:'done'};
  p.phases[1]={name:'Aggregation',meta:'Underway — compiling comparison',pct:35,state:'active',_fired:true};
  p.overall='86%'; p.remaining='<b>Outreach complete</b> — data pushed to aggregation';
  if(current==='insurance')renderMain();
  addMsg('Drake · just now','Gamma LLC\'s data is in — <b>outreach phase complete</b>. All five data sets pushed to aggregation; the comparison lands on your desk next.');
}
function addMsg(who,html){
  DATA[current].msgs.push({who,html});
  const d=document.createElement('div');d.className='m';
  d.innerHTML=`<div class="who">${who}</div><div class="bubble">${html}</div>`;
  $('msgs').appendChild(d); $('msgs').scrollTop=1e6;
}
function openSheet(t){
  const p=DATA[current], agent=p.agent;
  const done=t.doneCount>=t.total;
  const hist=genHistory(t,agent);
  const s=$('sheet');
  s.innerHTML=`
    <button class="t-close" onclick="document.getElementById('sheetBg').classList.remove('open')">×</button>
    <div class="t-head" style="position:relative">
      <div class="t-crumb">${p.org} / ${p.name} / ${p.boardTitle} <span class="tid">${t.id}</span></div>
      <h3>${t.name}</h3>
    </div>
    <div class="t-body">
      <div class="t-main">
        <div class="t-sec">Description</div>
        <div class="t-desc">${t.desc}</div>
        <div class="t-sec">Checklist · ${t.doneCount}/${t.total}</div>
        ${t.items.map((it,i)=>`<div class="s-item ${i<t.doneCount?'done':''}"><div class="box">${i<t.doneCount?'✓':''}</div>
          <div>${it}${i<t.doneCount?`<span class="ev">evidence · ledger event, auditable</span>`:''}</div></div>`).join('')}
        <div class="t-sec">Activity</div>
        <div class="act">
          ${hist.map(h=>`<div class="a-row ${h.type||''}"><span class="a-dot"></span><b>${h.who}</b> ${h.what}<span class="a-t">${h.t}</span>${h.ev?`<span class="a-t">· ${h.ev}</span>`:''}${h.q?`<span class="a-quote">${h.q}</span>`:''}</div>`).join('')}
        </div>
      </div>
      <div class="t-side">
        <div class="f-row"><div class="f-k">Status</div><div class="f-v"><span class="pill ${done?'done':(t.doneCount>0?'prog':'q')}">${done?'Done':(t.doneCount>0?'In progress':'Queued')}</span></div></div>
        <div class="f-row"><div class="f-k">Agent</div><div class="f-v"><span class="agent-chip"><span class="av">${agent[0].toUpperCase()}</span>${agent}</span></div></div>
        <div class="f-row"><div class="f-k">Priority</div><div class="f-v">${t.priority==='Urgent'?'🔴 Urgent':t.priority}</div></div>
        <div class="f-row"><div class="f-k">Created</div><div class="f-v">${t.created}</div></div>
        <div class="f-row"><div class="f-k">Due</div><div class="f-v">${t.due}</div></div>
        <div class="f-row"><div class="f-k">Phase</div><div class="f-v">${p.boardTitle}</div></div>
        <div class="f-row"><div class="f-k">Progress</div><div class="f-v">${Math.round(t.doneCount/t.total*100)}%</div><div class="bar" style="margin-top:5px"><i style="width:${Math.round(t.doneCount/t.total*100)}%"></i></div></div>
        <div class="f-row"><div class="f-k">Source</div><div class="f-v" style="font-size:12px;color:var(--ink-2)">ClickUp task (mirrored live)</div></div>
      </div>
    </div>
    <div class="t-foot"><input placeholder="Comment — goes to ${agent} and onto the task…" onkeydown="if(event.key==='Enter'&&this.value.trim()){toast('Comment posted to the task (mockup)');this.value='';}"></div>`;
  $('sheetBg').classList.add('open');
}
$('sheetBg').onclick=e=>{if(e.target.id==='sheetBg')$('sheetBg').classList.remove('open');};
$('peekBtn').onclick=()=>$('engine').classList.toggle('open');
$('composer').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&e.target.value.trim()){
    const t=e.target.value; e.target.value='';
    const d=document.createElement('div');d.className='m you';
    d.innerHTML=`<div class="who">You</div><div class="bubble">${t.replace(/</g,'&lt;')}</div>`;
    $('msgs').appendChild(d);$('msgs').scrollTop=1e6;
    setTimeout(()=>addMsg(DATA[current].agent+' · just now','(mockup) In the live build this starts or resumes my session and I answer here.'),700);
  }
});
function toast(msg){const b=$('banner');b.textContent=msg;b.classList.add('show');setTimeout(()=>b.classList.remove('show'),2000);}
function renderAll(){renderSidebar();renderMain();renderChat();}
renderAll();
